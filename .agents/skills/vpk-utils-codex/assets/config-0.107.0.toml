[projects."/Users/esoh/Downloads/craft-agents-oss-main"]
trust_level = "trusted"

[projects."/Users/esoh/Documents/Labs/chatbot-main"]
trust_level = "trusted"

[projects."/Users/esoh/Documents/Labs/cmux-main/cmux"]
