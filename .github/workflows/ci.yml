name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint, test, build, and smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Verify lockfile registries
        run: node scripts/verify-pnpm-lockfile.js

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm run lint

      - name: Run typecheck
        run: pnpm run typecheck

      - name: Run deterministic JS unit tests
        run: pnpm run test:unit:js

      - name: Run Next.js build
        run: pnpm run build

      - name: Run static export build
        run: pnpm run build:export

      - name: Build production Docker image
        run: docker build -f backend/Dockerfile -t vpk-rovo-ci .

      - name: Smoke production Docker image
        run: |
          docker run --rm -d --name vpk-rovo-ci -e VPK_RUNTIME_ADMIN_TOKEN=ci-smoke-token -p 8080:8080 vpk-rovo-ci
          trap 'docker logs vpk-rovo-ci || true; docker stop vpk-rovo-ci || true' EXIT
          for i in {1..45}; do
            if curl -fsS http://127.0.0.1:8080/api/health; then
              exit 0
            fi
            sleep 1
          done
          exit 1
