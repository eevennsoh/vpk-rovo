packages:
  - .
  - backend
minimumReleaseAge: 10080
trustPolicy: no-downgrade
# Dependency pinning tiers (see Engineering Standards in AGENTS.md):
#   Float   ^x.y.z  - stable libs; `pnpm update` may take patch + minor
#   Cautious ~x.y.z - libs where minors have broken us; patch only
#   Locked  x.y.z   - framework core + coordinated families; bump manually
# The catalog below holds Locked coordinated families that MUST move together.
# Reference them from package.json as "catalog:". Bump the version here once
# and every member updates in lockstep.
catalog:
  # tiptap - all @tiptap/* must share one version
  '@tiptap/core': 3.23.6
  '@tiptap/extension-color': 3.23.6
  '@tiptap/extension-highlight': 3.23.6
  '@tiptap/extension-link': 3.23.6
  '@tiptap/extension-mention': 3.23.6
  '@tiptap/extension-text-align': 3.23.6
  '@tiptap/extension-text-style': 3.23.6
  '@tiptap/extension-underline': 3.23.6
  '@tiptap/markdown': 3.23.6
  '@tiptap/pm': 3.23.6
  '@tiptap/react': 3.23.6
  '@tiptap/starter-kit': 3.23.6
  '@tiptap/suggestion': 3.23.6
  # json-render - published from one monorepo at a single version
  '@json-render/codegen': 0.19.0
  '@json-render/core': 0.19.0
  '@json-render/image': 0.19.0
  '@json-render/ink': 0.19.0
  '@json-render/react': 0.19.0
  '@json-render/react-pdf': 0.19.0
  '@json-render/react-three-fiber': 0.19.0
  '@json-render/remotion': 0.19.0
  '@json-render/yaml': 0.19.0
  # remotion - remotion + every @remotion/* must match exactly
  'remotion': 4.0.468
  '@remotion/player': 4.0.468
overrides:
  '@hono/node-server': ^1.19.10
  dompurify: ^3.3.2
  express-rate-limit: ^8.2.2
  fast-uri: 3.1.2
  hono: ^4.12.4
  postcss: ^8.5.13
  qs: 6.15.2
  ws: ^8.21.0
allowBuilds:
  '@google/genai': false
  agent-browser: true
  better-sqlite3: false
  edgedriver: true
  esbuild: true
  geckodriver: true
  iframe-resizer: true
  msw: false
  node-llama-cpp: false
  protobufjs: true
  react-grab: true
  sharp: false
  tree-sitter-go: true
  tree-sitter-javascript: true
  tree-sitter-python: true
  tree-sitter-rust: true
  tree-sitter-typescript: true
  unrs-resolver: false
# Accept our intentionally bleeding-edge core versions for deps that still
# declare an older-major peer range. These are verified-working pairings (the
# app builds, lints, typechecks, and runs) — this silences the peer warning
# without downgrading. `pnpm update` cannot fix these; only widening the peer
# floor (here) or the upstream dep widening its declared range can.
peerDependencyRules:
  allowedVersions:
    react: ^18.2.0 || ^19.0.0
    react-dom: ^18.2.0 || ^19.0.0
    eslint: ^10.0.0
    typescript: ^6.0.0
    ink: ^7.0.0
    three: '>=0.183.0'
