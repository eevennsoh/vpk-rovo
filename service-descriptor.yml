description: "VPK Service"
organization: Engineering Services
notifications:
  email: esoh@atlassian.com
buildNumber: ${VERSION}
compose:
  app:
    image: docker.atl-paas.net/vpk-rovo
    tag: app-${VERSION}
    ports:
      - "8080:8080"
    environment:
      AI_GATEWAY_URL: ((ssm:/vpk-rovo/AI_GATEWAY_URL))
      AI_GATEWAY_USE_CASE_ID: ((ssm:/vpk-rovo/AI_GATEWAY_USE_CASE_ID))
      AI_GATEWAY_CLOUD_ID: ((ssm:/vpk-rovo/AI_GATEWAY_CLOUD_ID))
      AI_GATEWAY_USER_ID: ((ssm:/vpk-rovo/AI_GATEWAY_USER_ID))
      ASAP_PRIVATE_KEY: ((ssm:/vpk-rovo/ASAP_PRIVATE_KEY))
      ASAP_KID: ((ssm:/vpk-rovo/ASAP_KID))
      ASAP_ISSUER: ((ssm:/vpk-rovo/ASAP_ISSUER))
      PORT: "8080"
